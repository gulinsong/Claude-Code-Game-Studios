<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 6" width="200" height="6">
  <defs>
    <linearGradient id="lineGrad" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#4ECDC4" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#4ECDC4" stop-opacity="1"/>
      <stop offset="100%" stop-color="#4ECDC4" stop-opacity="0.8"/>
    </linearGradient>
    <filter id="lineGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Glow behind line -->
  <line x1="2" y1="3" x2="198" y2="3" stroke="#4ECDC4" stroke-width="6" opacity="0.3" filter="url(#lineGlow)"/>
  <!-- Main line -->
  <line x1="2" y1="3" x2="198" y2="3" stroke="url(#lineGrad)" stroke-width="4" stroke-linecap="round"/>
  <!-- White edge highlight -->
  <line x1="2" y1="2" x2="198" y2="2" stroke="white" stroke-width="1" opacity="0.5" stroke-linecap="round"/>
</svg>
