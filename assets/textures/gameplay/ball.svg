<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="ballGrad" cx="40%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#4ECDC4" stop-opacity="1"/>
      <stop offset="100%" stop-color="#2BA8A0" stop-opacity="1"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Outer glow -->
  <circle cx="32" cy="32" r="30" fill="#4ECDC4" opacity="0.2" filter="url(#glow)"/>
  <!-- Main ball -->
  <circle cx="32" cy="32" r="20" fill="url(#ballGrad)"/>
  <!-- Highlight -->
  <ellipse cx="26" cy="26" rx="6" ry="4" fill="white" opacity="0.6"/>
</svg>
