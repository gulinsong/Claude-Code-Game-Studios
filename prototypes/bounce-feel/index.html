<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>反弹手感验证 — Bounce Master Prototype</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #F7F7F7; overflow: hidden; touch-action: none; font-family: -apple-system, sans-serif; }
canvas { display: block; margin: 0 auto; background: #FFFFFF; border: 2px solid #DDD; }
#controls { position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; z-index: 10; }
button { padding: 12px 24px; font-size: 16px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
#launchBtn { background: #4ECDC4; color: white; }
#resetBtn { background: #FFE66D; color: #333; }
#info { position: fixed; top: 10px; left: 50%; transform: translateX(-50%); text-align: center; color: #555; font-size: 14px; }
#info span { margin: 0 8px; }
#feedback { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 48px; font-weight: bold; color: #4ECDC4; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
</style>
</head>
<body>
<div id="info">
    <span>Lines: <b id="lineCount">0/3</b></span>
    <span>Collected: <b id="collectCount">0/0</b></span>
    <span>Status: <b id="status">Ready</b></span>
</div>
<canvas id="game"></canvas>
<div id="controls">
    <button id="launchBtn">Launch Ball</button>
    <button id="resetBtn">Reset</button>
</div>
<div id="feedback"></div>

<script>
// === CONFIG (from GDDs) ===
const CFG = {
    GRAVITY: 980,
    BALL_RADIUS: 15,
    BALL_SPEED: 300,
    MAX_SPEED: 1500,
    MIN_SPEED: 50,
    LINE_RESTITUTION: 0.95,
    BOUNDARY_RESTITUTION: 0.8,
    MAX_LINES: 3,
    LIGHTPOINT_RADIUS: 12,
    COLLECTION_TOLERANCE: 5,
    MIN_LINE_LENGTH: 20,
    BOUNDARY_PADDING: 20,
};

// === CANVAS SETUP ===
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = Math.min(window.innerWidth, 480);
const H = Math.min(window.innerHeight - 100, 800);
canvas.width = W;
canvas.height = H;

const PLAY = {
    left: CFG.BOUNDARY_PADDING,
    right: W - CFG.BOUNDARY_PADDING,
    top: CFG.BOUNDARY_PADDING + 40,
    bottom: H - CFG.BOUNDARY_PADDING - 60,
};

// === STATE ===
let ball, lines, lightPoints, particles;
let gameState = 'READY'; // READY, PLAYING, VICTORY, DEFEAT
let isDrawing = false;
let drawStart = null;
let drawEnd = null;

function initState() {
    ball = {
        x: W / 2, y: PLAY.top + 30,
        vx: 0, vy: 0,
        state: 'IDLE', // IDLE, MOVING, OUT
    };
    lines = [];
    lightPoints = generateLightPoints();
    particles = [];
    gameState = 'READY';
    isDrawing = false;
    drawStart = null;
    drawEnd = null;
    updateUI();
}

function generateLightPoints() {
    const count = 5;
    const pts = [];
    const margin = 60;
    for (let i = 0; i < count; i++) {
        pts.push({
            id: i,
            x: margin + Math.random() * (PLAY.right - PLAY.left - margin * 2),
            y: PLAY.top + 100 + Math.random() * (PLAY.bottom - PLAY.top - 200),
            collected: false,
            animTimer: 0,
            phase: Math.random() * Math.PI * 2,
        });
    }
    return pts;
}

// === INPUT ===
function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const t = e.touches ? e.touches[0] : e;
    return { x: t.clientX - rect.left, y: t.clientY - rect.top };
}

function inPlayArea(p) {
    return p.x >= PLAY.left && p.x <= PLAY.right && p.y >= PLAY.top && p.y <= PLAY.bottom;
}

canvas.addEventListener('mousedown', startDraw);
canvas.addEventListener('mousemove', moveDraw);
canvas.addEventListener('mouseup', endDraw);
canvas.addEventListener('touchstart', e => { e.preventDefault(); startDraw(e); });
canvas.addEventListener('touchmove', e => { e.preventDefault(); moveDraw(e); });
canvas.addEventListener('touchend', e => { e.preventDefault(); endDraw(e); });

function startDraw(e) {
    if (gameState !== 'READY' && gameState !== 'PLAYING') return;
    if (lines.length >= CFG.MAX_LINES) return;
    const p = getPos(e);
    if (!inPlayArea(p)) return;
    isDrawing = true;
    drawStart = p;
    drawEnd = p;
}

function moveDraw(e) {
    if (!isDrawing) return;
    drawEnd = getPos(e);
}

function endDraw(e) {
    if (!isDrawing) return;
    isDrawing = false;
    if (!drawStart || !drawEnd) return;
    const dx = drawEnd.x - drawStart.x;
    const dy = drawEnd.y - drawStart.y;
    const len = Math.sqrt(dx * dx + dy * dy);
    if (len < CFG.MIN_LINE_LENGTH) { drawStart = null; drawEnd = null; return; }

    lines.push({
        x1: drawStart.x, y1: drawStart.y,
        x2: drawEnd.x, y2: drawEnd.y,
        isHit: false,
    });
    drawStart = null;
    drawEnd = null;
    spawnParticles(drawEnd || lines[lines.length-1], '#4ECDC4', 5);
    updateUI();
}

document.getElementById('launchBtn').addEventListener('click', () => {
    if (gameState !== 'READY') return;
    gameState = 'PLAYING';
    ball.state = 'MOVING';
    ball.vy = CFG.BALL_SPEED; // Launch downward
    ball.vx = (Math.random() - 0.5) * 100;
    updateUI();
});

document.getElementById('resetBtn').addEventListener('click', initState);

// === PHYSICS ===
function updateBall(dt) {
    if (ball.state !== 'MOVING') return;

    // Gravity
    ball.vy += CFG.GRAVITY * dt;

    // Clamp speed
    let speed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
    if (speed > CFG.MAX_SPEED) { ball.vx *= CFG.MAX_SPEED / speed; ball.vy *= CFG.MAX_SPEED / speed; }
    if (speed > 0 && speed < CFG.MIN_SPEED) { ball.vx *= CFG.MIN_SPEED / speed; ball.vy *= CFG.MIN_SPEED / speed; }

    // Move
    ball.x += ball.vx * dt;
    ball.y += ball.vy * dt;

    // Boundary collisions (left, right, top = bounce)
    if (ball.x - CFG.BALL_RADIUS < PLAY.left) {
        ball.x = PLAY.left + CFG.BALL_RADIUS;
        ball.vx = Math.abs(ball.vx) * CFG.BOUNDARY_RESTITUTION;
    }
    if (ball.x + CFG.BALL_RADIUS > PLAY.right) {
        ball.x = PLAY.right - CFG.BALL_RADIUS;
        ball.vx = -Math.abs(ball.vx) * CFG.BOUNDARY_RESTITUTION;
    }
    if (ball.y - CFG.BALL_RADIUS < PLAY.top) {
        ball.y = PLAY.top + CFG.BALL_RADIUS;
        ball.vy = Math.abs(ball.vy) * CFG.BOUNDARY_RESTITUTION;
    }

    // Bottom boundary = out of bounds
    if (ball.y - CFG.BALL_RADIUS > PLAY.bottom) {
        ball.state = 'OUT';
        gameState = 'DEFEAT';
        showFeedback('Out!', '#999');
        updateUI();
        return;
    }

    // Line collisions
    for (const line of lines) {
        if (line.isHit) continue; // Still bounce, just mark as hit
        const result = ballLineCollision(ball, line);
        if (result) {
            // Reflect velocity
            const dot = ball.vx * result.nx + ball.vy * result.ny;
            ball.vx = (ball.vx - 2 * dot * result.nx) * CFG.LINE_RESTITUTION;
            ball.vy = (ball.vy - 2 * dot * result.ny) * CFG.LINE_RESTITUTION;
            // Push ball out of line
            ball.x = result.cx + result.nx * (CFG.BALL_RADIUS + 1);
            ball.y = result.cy + result.ny * (CFG.BALL_RADIUS + 1);
            line.isHit = true;
            spawnParticles({ x: result.cx, y: result.cy }, '#FFE66D', 12);
            updateUI();
        }
    }

    // Light point collection
    for (const lp of lightPoints) {
        if (lp.collected) continue;
        const dx = ball.x - lp.x;
        const dy = ball.y - lp.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const threshold = CFG.BALL_RADIUS + CFG.LIGHTPOINT_RADIUS + CFG.COLLECTION_TOLERANCE;
        if (dist < threshold) {
            lp.collected = true;
            lp.animTimer = 0.3;
            spawnParticles(lp, '#FFFFFF', 15);
            updateUI();
        }
    }

    // Victory check
    if (lightPoints.every(lp => lp.collected)) {
        gameState = 'VICTORY';
        ball.state = 'DONE';
        showFeedback('Perfect!', '#4ECDC4');
        spawnParticles(ball, '#FFE66D', 30);
        updateUI();
    }
}

function ballLineCollision(ball, line) {
    const lx = line.x2 - line.x1;
    const ly = line.y2 - line.y1;
    const len = Math.sqrt(lx * lx + ly * ly);
    if (len === 0) return null;

    // Line direction and normal
    const dx = lx / len;
    const dy = ly / len;
    // Normal (perpendicular, pointing "up" side)
    let nx = -dy;
    let ny = dx;

    // Vector from line start to ball
    const bx = ball.x - line.x1;
    const by = ball.y - line.y1;

    // Project ball onto line
    const proj = bx * dx + by * dy;
    if (proj < -CFG.BALL_RADIUS || proj > len + CFG.BALL_RADIUS) return null;

    // Distance from ball center to line
    const dist = bx * nx + by * ny;
    if (Math.abs(dist) > CFG.BALL_RADIUS + 3) return null; // 3px collision padding

    // Closest point on line segment
    const clampedProj = Math.max(0, Math.min(len, proj));
    const cx = line.x1 + dx * clampedProj;
    const cy = line.y1 + dy * clampedProj;

    // Check actual distance to closest point
    const dcx = ball.x - cx;
    const dcy = ball.y - cy;
    const actualDist = Math.sqrt(dcx * dcx + dcy * dcy);
    if (actualDist > CFG.BALL_RADIUS + 3) return null;

    // Ensure normal points toward ball
    if (dist < 0) { nx = -nx; ny = -ny; }

    return { cx, cy, nx, ny };
}

// === PARTICLES ===
function spawnParticles(pos, color, count) {
    for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 50 + Math.random() * 150;
        particles.push({
            x: pos.x, y: pos.y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: 0.3 + Math.random() * 0.3,
            maxLife: 0.3 + Math.random() * 0.3,
            size: 2 + Math.random() * 6,
            color: color,
        });
    }
}

function updateParticles(dt) {
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.life -= dt;
        if (p.life <= 0) particles.splice(i, 1);
    }
}

// === RENDER ===
function render(time) {
    ctx.clearRect(0, 0, W, H);

    // Play area
    ctx.strokeStyle = '#EEE';
    ctx.lineWidth = 1;
    ctx.strokeRect(PLAY.left, PLAY.top, PLAY.right - PLAY.left, PLAY.bottom - PLAY.top);

    // Bottom boundary indicator (dashed red line)
    ctx.strokeStyle = '#FF4444';
    ctx.lineWidth = 2;
    ctx.setLineDash([8, 4]);
    ctx.beginPath();
    ctx.moveTo(PLAY.left, PLAY.bottom);
    ctx.lineTo(PLAY.right, PLAY.bottom);
    ctx.stroke();
    ctx.setLineDash([]);

    // Light points
    const t = time / 1000;
    for (const lp of lightPoints) {
        if (lp.collected) {
            if (lp.animTimer > 0) {
                const s = 1 + (0.3 - lp.animTimer) * 3;
                ctx.globalAlpha = lp.animTimer / 0.3;
                ctx.fillStyle = '#FFFFFF';
                ctx.beginPath();
                ctx.arc(lp.x, lp.y, CFG.LIGHTPOINT_RADIUS * s, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
            continue;
        }
        // Pulsing glow
        const pulse = 0.9 + 0.1 * Math.sin(t * 2 * Math.PI + lp.phase);
        const r = CFG.LIGHTPOINT_RADIUS * pulse;
        // Glow
        ctx.fillStyle = 'rgba(78, 205, 196, 0.2)';
        ctx.beginPath();
        ctx.arc(lp.x, lp.y, r + 8, 0, Math.PI * 2);
        ctx.fill();
        // Core
        ctx.fillStyle = '#4ECDC4';
        ctx.beginPath();
        ctx.arc(lp.x, lp.y, r, 0, Math.PI * 2);
        ctx.fill();
        // Highlight
        ctx.fillStyle = 'rgba(255,255,255,0.6)';
        ctx.beginPath();
        ctx.arc(lp.x - 3, lp.y - 3, r * 0.4, 0, Math.PI * 2);
        ctx.fill();
    }

    // Lines
    for (const line of lines) {
        ctx.strokeStyle = line.isHit ? '#3AA89F' : '#4ECDC4';
        ctx.lineWidth = 4;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(line.x1, line.y1);
        ctx.lineTo(line.x2, line.y2);
        ctx.stroke();
        // Endpoints
        ctx.fillStyle = '#4ECDC4';
        ctx.beginPath();
        ctx.arc(line.x1, line.y1, 6, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(line.x2, line.y2, 6, 0, Math.PI * 2);
        ctx.fill();
    }

    // Preview line
    if (isDrawing && drawStart && drawEnd) {
        ctx.strokeStyle = 'rgba(78, 205, 196, 0.5)';
        ctx.lineWidth = 4;
        ctx.setLineDash([8, 4]);
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(drawStart.x, drawStart.y);
        ctx.lineTo(drawEnd.x, drawEnd.y);
        ctx.stroke();
        ctx.setLineDash([]);
    }

    // Ball
    if (ball.state !== 'OUT') {
        // Shadow
        ctx.fillStyle = 'rgba(0,0,0,0.1)';
        ctx.beginPath();
        ctx.arc(ball.x + 2, ball.y + 2, CFG.BALL_RADIUS, 0, Math.PI * 2);
        ctx.fill();
        // Ball body
        ctx.fillStyle = '#FF6B6B';
        ctx.beginPath();
        ctx.arc(ball.x, ball.y, CFG.BALL_RADIUS, 0, Math.PI * 2);
        ctx.fill();
        // Highlight
        ctx.fillStyle = 'rgba(255,255,255,0.5)';
        ctx.beginPath();
        ctx.arc(ball.x - 4, ball.y - 4, CFG.BALL_RADIUS * 0.4, 0, Math.PI * 2);
        ctx.fill();
    }

    // Particles
    for (const p of particles) {
        ctx.globalAlpha = p.life / p.maxLife;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * (p.life / p.maxLife), 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.globalAlpha = 1;
}

// === UI ===
function updateUI() {
    document.getElementById('lineCount').textContent = `${lines.length}/${CFG.MAX_LINES}`;
    const collected = lightPoints.filter(lp => lp.collected).length;
    document.getElementById('collectCount').textContent = `${collected}/${lightPoints.length}`;
    document.getElementById('status').textContent =
        gameState === 'READY' ? 'Ready' :
        gameState === 'PLAYING' ? 'Playing' :
        gameState === 'VICTORY' ? 'WIN!' : 'LOST';
}

function showFeedback(text, color) {
    const el = document.getElementById('feedback');
    el.textContent = text;
    el.style.color = color;
    el.style.opacity = 1;
    setTimeout(() => { el.style.opacity = 0; }, 1000);
}

// === GAME LOOP ===
let lastTime = 0;
function loop(time) {
    const dt = Math.min((time - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = time;

    // Update light point anim timers
    for (const lp of lightPoints) {
        if (lp.animTimer > 0) lp.animTimer -= dt;
    }

    if (gameState === 'PLAYING') {
        updateBall(dt);
    }
    updateParticles(dt);
    render(time);
    requestAnimationFrame(loop);
}

// === START ===
initState();
requestAnimationFrame(loop);
</script>
</body>
</html>
