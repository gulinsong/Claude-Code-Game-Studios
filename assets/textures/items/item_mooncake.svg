  <path d="M10 14 Q16 18 22 14" fill="none" stroke="#8B4513" stroke-width="1"/>
  <!-- 描边 -->
  <ellipse cx="16" cy="18" rx="12" ry="10" fill="none" stroke="#2D2D2D" stroke-width="2"/>
