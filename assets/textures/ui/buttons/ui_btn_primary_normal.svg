<?xml version="1.0" encoding="UTF-8"?>
<!-- 主按钮 - 正常状态 -->
<!-- 尺寸: 120x48，可 9-slice 缩放 -->
<svg width="120" height="48" viewBox="0 0 120 48" xmlns="http://www.w3.org/2000/svg">
  <!-- 按钮背景 -->
  <rect x="0" y="0" width="120" height="48" rx="8" fill="#4A7C59"/>
  <!-- 高光 -->
  <rect x="4" y="4" width="112" height="20" rx="6" fill="rgba(255,255,255,0.2)"/>
  <!-- 描边 -->
  <rect x="0" y="0" width="120" height="48" rx="8" fill="none" stroke="#3A6249" stroke-width="2"/>
  <!-- 示例文字占位 -->
  <text x="60" y="30" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#FFFFFF">按钮</text>
</svg>