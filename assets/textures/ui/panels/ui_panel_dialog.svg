<?xml version="1.0" encoding="UTF-8"?>
<!-- 对话框面板 -->
<svg width="320" height="160" viewBox="0 0 320 160" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect x="0" y="0" width="320" height="140" rx="8" fill="#F5E6D3"/>
  <!-- 标题栏 -->
  <rect x="0" y="0" width="320" height="32" rx="8" fill="#4A7C59"/>
  <rect x="0" y="24" width="320" height="8" fill="#4A7C59"/>
  <!-- 标题文字占位 -->
  <text x="16" y="22" font-family="sans-serif" font-size="14" fill="#FFFFFF">标题</text>
  <!-- 内容区域装饰 -->
  <rect x="16" y="48" width="288" height="76" rx="4" fill="none" stroke="#D4A574" stroke-width="1" stroke-dasharray="4,2"/>
  <!-- 边框 -->
  <rect x="0" y="0" width="320" height="140" rx="8" fill="none" stroke="#4A7C59" stroke-width="2"/>
  <!-- 对话指示箭头 -->
  <polygon points="40,140 60,140 50,160" fill="#F5E6D3" stroke="#4A7C59" stroke-width="2"/>
</svg>