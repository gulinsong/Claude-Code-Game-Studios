<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <defs>
    <linearGradient id="starFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE66D"/>
      <stop offset="50%" stop-color="#FFD93D"/>
      <stop offset="100%" stop-color="#FFC107"/>
    </linearGradient>
    <filter id="starGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <polygon
    points="40,4 49,28 74,28 54,44 61,68 40,54 19,68 26,44 6,28 31,28"
    fill="url(#starFill)"
    stroke="#E6B800"
    stroke-width="1.5"
    filter="url(#starGlow)"
  />
  <!-- Highlight -->
  <polygon
    points="40,10 46,26 40,22 34,26"
    fill="white"
    opacity="0.4"
  />
</svg>
