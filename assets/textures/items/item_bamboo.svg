<?xml version="1.0" encoding="UTF-8"?>
<!-- 竹子材料 -->
<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- 竹节 -->
  <rect x="10" y="4" width="12" height="24" rx="2" fill="#228B22"/>
  <!-- 竹节纹理 -->
  <rect x="10" y="10" width="12" height="2" fill="#1B5E20"/>
  <rect x="10" y="18" width="12" height="2" fill="#1B5E20"/>
  <!-- 高光 -->
  <rect x="12" y="6" width="3" height="16" rx="1" fill="rgba(255,255,255,0.3)"/>
  <!-- 描边 -->
  <rect x="10" y="4" width="12" height="24" rx="2" fill="none" stroke="#2D2D2D" stroke-width="2"/>
</svg>