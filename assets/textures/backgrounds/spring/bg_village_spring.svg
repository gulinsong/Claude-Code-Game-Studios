<?xml version="1.0" encoding="UTF-8"?>
<!-- 村庄背景 - 春季 (占位图) -->
<!-- 实际使用时需用 AI 生成 1280x720 像素图 -->
<svg width="320" height="180" viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg">
  <!-- 天空 -->
  <rect width="320" height="100" fill="#87CEEB"/>
  <!-- 云朵 -->
  <ellipse cx="50" cy="30" rx="30" ry="15" fill="#FFFFFF"/>
  <ellipse cx="70" cy="25" rx="20" ry="12" fill="#FFFFFF"/>
  <ellipse cx="250" cy="40" rx="25" ry="12" fill="#FFFFFF"/>
  <!-- 远山 -->
  <path d="M0 100 L60 60 L120 90 L180 50 L240 80 L320 70 L320 100 Z" fill="#A8D5BA"/>
  <!-- 草地 -->
  <rect y="100" width="320" height="80" fill="#7CB342"/>
  <!-- 樱花树 -->
  <rect x="40" y="80" width="10" height="50" fill="#8B4513"/>
  <circle cx="45" cy="70" r="25" fill="#FFB7C5"/>
  <circle cx="55" cy="60" r="20" fill="#FFC0CB"/>
  <circle cx="35" cy="65" r="18" fill="#FFB7C5"/>
  <!-- 房屋 -->
  <rect x="120" y="110" width="40" height="40" fill="#D4A574"/>
  <path d="M115 110 L140 90 L165 110 Z" fill="#8B4513"/>
  <rect x="130" y="125" width="15" height="25" fill="#6B4423"/>
  <!-- 更多樱花 -->
  <circle cx="280" cy="75" r="22" fill="#FFB7C5"/>
  <circle cx="290" cy="85" r="18" fill="#FFC0CB"/>
  <!-- 小路 -->
  <path d="M160 180 Q140 160 120 150 Q100 140 80 180" fill="#A0896C"/>
  <!-- 文字标注 -->
  <text x="160" y="170" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#2D2D2D">春 - Spring</text>
</svg>