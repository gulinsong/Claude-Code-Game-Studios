<?xml version="1.0" encoding="UTF-8"?>
<!-- 主按钮 - 按下状态 -->
<svg width="120" height="48" viewBox="0 0 120 48" xmlns="http://www.w3.org/2000/svg">
  <!-- 按钮背景 (变暗) -->
  <rect x="0" y="0" width="120" height="48" rx="8" fill="#3A6249"/>
  <!-- 内阴影效果 -->
  <rect x="4" y="4" width="112" height="40" rx="6" fill="rgba(0,0,0,0.2)"/>
  <!-- 描边 -->
  <rect x="0" y="0" width="120" height="48" rx="8" fill="none" stroke="#2D4D39" stroke-width="2"/>
  <!-- 示例文字占位 -->
  <text x="60" y="32" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#E0E0E0">按钮</text>
</svg>